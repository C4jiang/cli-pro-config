    { name = "yml", text = "Y", fg = "#f7768e" },
    { name = "md", text = "M", fg = "#7aa2f7" },
    { name = "txt", text = "T", fg = "#c0caf5" },
    { name = "sh", text = "$", fg = "#9ece6a" },
    { name = "zsh", text = "$", fg = "#9ece6a" },
    { name = "rs", text = "R", fg = "#dea584" },
