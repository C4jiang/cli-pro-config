[mgr]
show_hidden = true
sort_by = "natural"
sort_sensitive = false
linemode = "size"
show_symlink = true
scrolloff = 8

[preview]
wrap = "yes"
max_width = 1600
max_height = 1600

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" }
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  ]
