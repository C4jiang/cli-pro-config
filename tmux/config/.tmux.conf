set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
set-environment -g LANG "en_US.UTF-8"
set-environment -g LC_ALL "en_US.UTF-8"
set -ga update-environment " LANG LC_ALL LC_CTYPE"

unbind C-a
set -g prefix C-b
bind C-b send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded ☕"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -g status-style fg=colour252,bg=colour235
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[fg=colour81,bold]#S #[fg=colour244]| #[fg=colour250]%Y-%m-%d %H:%M"
set -g status-right "#[fg=colour244]#{pane_current_path} #[fg=colour81]| #[fg=colour229,bold]#(whoami)"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
